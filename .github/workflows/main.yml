name: Build Android APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Locate Android project
        shell: bash
        run: |
          if [ -f "settings.gradle.kts" ]; then
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
          elif [ -f "GalaxyDeskClock/settings.gradle.kts" ]; then
            echo "PROJECT_DIR=GalaxyDeskClock" >> "$GITHUB_ENV"
          else
            echo "Could not find settings.gradle.kts. Upload the unzipped project files to this repository."
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.9'

      - name: Run unit tests
        shell: bash
        run: gradle -p "$PROJECT_DIR" :app:testDebugUnitTest

      - name: Build debug APK
        shell: bash
        run: gradle -p "$PROJECT_DIR" :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: GalaxyDeskClock-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
